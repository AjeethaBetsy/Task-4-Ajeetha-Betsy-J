<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intern Manager | DecodeLabs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="header-content">
      <h1>🚀 DecodeLabs Intern Portal</h1>
      <p>Manage your interns efficiently</p>
    </div>
  </header>

  <!-- Main Container -->
  <main class="container">

    <!-- Add / Edit Intern Form -->
    <section class="form-section">
      <h2 id="form-title">➕ Add New Intern</h2>

      <div class="form-group">
        <input
          type="text"
          id="intern-name"
          placeholder="Full Name"
        />
      </div>

      <div class="form-group">
        <input
          type="email"
          id="intern-email"
          placeholder="Email Address"
        />
      </div>

      <div class="form-group">
        <input
          type="text"
          id="intern-role"
          placeholder="Role (e.g. Frontend Developer)"
        />
      </div>

      <div class="form-group">
        <input
          type="text"
          id="intern-batch"
          placeholder="Batch Year (e.g. 2026)"
        />
      </div>

      <!-- Hidden input to store ID when editing -->
      <input type="hidden" id="edit-intern-id" />

      <div class="form-buttons">
        <button id="submit-btn" onclick="handleFormSubmit()">
          Add Intern
        </button>
        <button id="cancel-btn" onclick="cancelEdit()" style="display:none;">
          Cancel
        </button>
      </div>

      <!-- Message shown after actions -->
      <p id="form-message"></p>
    </section>

    <!-- Interns List Section -->
    <section class="list-section">
      <div class="list-header">
        <h2>👥 All Interns</h2>
        <button onclick="loadInterns()">🔄 Refresh</button>
      </div>

      <!-- Loading message -->
      <p id="loading-msg">Loading interns...</p>

      <!-- Error message -->
      <p id="error-msg" style="display:none;"></p>

      <!-- Interns will be displayed here -->
      <div id="interns-container"></div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 DecodeLabs | Full Stack Development Training</p>
  </footer>

  <!-- Link to our JavaScript file -->
  <script src="app.js"></script>

</body>
</html>
